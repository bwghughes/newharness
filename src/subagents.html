<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strap-in | Sub-agents</title>
<style>
:root {
  color-scheme: light dark;
  --bg:#0d1117; --fg:#e6edf3;
  --border:#21262d; --border-soft:#30363d;
  --card-bg:#0d1117; --column-bg:#161b22;
  --muted:#8b949e; --muted-soft:#484f58;
  --accent-running:#58a6ff;
  --accent-running-glow:rgba(88,166,255,0.08);
  --accent-done:#238636;
  --accent-failed:#da3633;
  --count-bg:#21262d;
  --code-bg:#1f2937; --code-fg:#e6edf3;
  --link:#58a6ff;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#f6f8fa; --fg:#1f2328;
    --border:#d0d7de; --border-soft:#b1bac4;
    --card-bg:#ffffff; --column-bg:#eef1f4;
    --muted:#57606a; --muted-soft:#8c959f;
    --accent-running:#0969da;
    --accent-running-glow:rgba(9,105,218,0.10);
    --accent-done:#1a7f37;
    --accent-failed:#cf222e;
    --count-bg:#d0d7de;
    --code-bg:#eef1f4; --code-fg:#1f2328;
    --link:#0969da;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
}
.header{
  padding:20px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
}
.header h1{
  font-size:18px;font-weight:700;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#ff1078,#b428ff,#0050ff,#00ffc8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.header nav{display:flex;gap:14px;font-size:12px}
.header nav a{color:var(--muted);text-decoration:none}
.header nav a:hover{color:var(--fg)}
.header nav a.active{color:var(--fg);font-weight:600}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--muted-soft);
  flex-shrink:0;
}
.status-dot.connected{background:var(--accent-done);animation:pulse 2s infinite}
.status-dot.disconnected{background:#da3633}
.status-text{font-size:12px;color:var(--muted-soft)}
.header-spacer{flex:1}
.usage{
  font-size:11px;color:var(--muted);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
  letter-spacing:-0.2px;
}
.board{
  display:flex;gap:16px;padding:20px 28px;
  min-height:calc(100vh - 70px);
}
.column{
  flex:1;background:var(--column-bg);border-radius:10px;
  padding:14px;border:1px solid var(--border);
  display:flex;flex-direction:column;
}
.column-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.column-header h2{
  font-size:13px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.5px;
  color:var(--muted);
}
.count{
  background:var(--count-bg);border-radius:10px;
  padding:1px 7px;font-size:11px;color:var(--muted);
}
.cards{flex:1;display:flex;flex-direction:column;gap:8px}
.card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;
  border-left:3px solid var(--muted-soft);
  animation:slideIn 0.3s ease;
}
.card.running{
  border-left-color:var(--accent-running);
  box-shadow:0 0 12px var(--accent-running-glow);
}
.card.completed{border-left-color:var(--accent-done);opacity:0.85}
.card.failed{border-left-color:var(--accent-failed);opacity:0.9}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:10px}
.agent-id{
  font-size:11px;color:var(--muted-soft);font-weight:600;letter-spacing:0.3px;
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
}
.cycle-time{
  font-size:10px;color:var(--muted);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
}
.cycle-time.live{color:var(--accent-running)}
.task-text{font-size:13px;line-height:1.5;color:var(--fg)}
.task-text strong{font-weight:700;color:var(--fg)}
.task-text em{font-style:italic}
.task-text code{
  background:var(--code-bg);color:var(--code-fg);
  padding:1px 5px;border-radius:4px;
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
  font-size:12px;
}
.meta{
  display:flex;gap:12px;margin-top:7px;padding-top:7px;
  border-top:1px solid var(--border);
  font-size:11px;color:var(--muted);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
}
.meta .tokens{color:var(--accent-running)}
.card.completed .meta .tokens{color:var(--accent-done)}
.card.failed .meta .tokens{color:var(--accent-failed)}
.activity{
  font-size:11px;color:var(--accent-running);margin-top:7px;
  padding-top:7px;border-top:1px solid var(--border);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
  word-break:break-all;
}
.empty-state{
  display:flex;align-items:center;justify-content:center;
  flex:1;color:var(--border-soft);font-size:13px;font-style:italic;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header class="header">
  <h1>strap-in</h1>
  <nav>
    <a href="/">Plan</a>
    <a href="/subagents" class="active">Sub-agents</a>
  </nav>
  <span class="status-dot" id="status"></span>
  <span class="status-text" id="status-text">connecting</span>
  <span class="header-spacer"></span>
  <span class="usage" id="totals"></span>
</header>
<div class="board">
  <div class="column">
    <div class="column-header"><h2>Running</h2><span class="count" id="cnt-running">0</span></div>
    <div class="cards" id="cards-running"></div>
  </div>
  <div class="column">
    <div class="column-header"><h2>Completed</h2><span class="count" id="cnt-completed">0</span></div>
    <div class="cards" id="cards-completed"></div>
  </div>
  <div class="column">
    <div class="column-header"><h2>Failed</h2><span class="count" id="cnt-failed">0</span></div>
    <div class="cards" id="cards-failed"></div>
  </div>
</div>
<script>
'use strict';
const agents = {};
const es = new EventSource('/subagent-events');

function safeRender() {
  try { render(); } catch (err) { console.error('render error:', err); }
}

function upsert(a) {
  agents[a.id] = a;
}

es.addEventListener('snapshot', e => {
  try {
    const data = JSON.parse(e.data);
    for (const k in agents) delete agents[k];
    for (const a of data.agents) upsert(a);
  } catch (err) { console.error('snapshot parse error:', err); }
  safeRender();
});

es.addEventListener('created', e => {
  try { upsert(JSON.parse(e.data)); } catch (err) {}
  safeRender();
});

es.addEventListener('updated', e => {
  try { upsert(JSON.parse(e.data)); } catch (err) {}
  safeRender();
});

es.onopen = () => {
  document.getElementById('status').className = 'status-dot connected';
  document.getElementById('status-text').textContent = 'connected';
};
es.onerror = () => {
  document.getElementById('status').className = 'status-dot disconnected';
  document.getElementById('status-text').textContent = 'disconnected';
};

function fmtDuration(ms) {
  if (ms < 1000) return '<1s';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m + 'm ' + (s % 60) + 's';
}

function fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return '' + n;
}

function tickLiveTimers() {
  const now = Date.now();
  for (const a of Object.values(agents)) {
    if (a.status !== 'running' || !a.started_at) continue;
    const el = document.querySelector('#agent-' + a.id + ' .cycle-time.live');
    if (el) el.textContent = fmtDuration(now - a.started_at);
  }
}

function renderTotals() {
  const all = Object.values(agents);
  const totalP = all.reduce((s, a) => s + (a.prompt_tokens || 0), 0);
  const totalC = all.reduce((s, a) => s + (a.completion_tokens || 0), 0);
  const el = document.getElementById('totals');
  if (totalP + totalC > 0) {
    el.textContent = fmtTokens(totalP + totalC) + ' tokens across ' + all.length + ' agent' + (all.length === 1 ? '' : 's');
  } else {
    el.textContent = all.length ? all.length + ' agent' + (all.length === 1 ? '' : 's') : '';
  }
}

function cardHtml(a) {
  let timeHtml = '';
  if (a.started_at && a.completed_at) {
    timeHtml = '<span class="cycle-time">' + fmtDuration(a.completed_at - a.started_at) + '</span>';
  } else if (a.started_at) {
    timeHtml = '<span class="cycle-time live">' + fmtDuration(Date.now() - a.started_at) + '</span>';
  }
  let h = '<div class="card-top"><span class="agent-id">' + esc(a.id) + '</span>' + timeHtml + '</div>';
  h += '<div class="task-text">' + md(a.task) + '</div>';
  if (a.activity) h += '<div class="activity">' + md(a.activity) + '</div>';
  const tokens = (a.prompt_tokens || 0) + (a.completion_tokens || 0);
  h += '<div class="meta"><span class="tokens">' + fmtTokens(tokens) + ' tok</span>';
  h += '<span>in ' + fmtTokens(a.prompt_tokens || 0) + ' \u00b7 out ' + fmtTokens(a.completion_tokens || 0) + '</span>';
  h += '</div>';
  return h;
}

function render() {
  const cols = {
    running: document.getElementById('cards-running'),
    completed: document.getElementById('cards-completed'),
    failed: document.getElementById('cards-failed'),
  };
  const counts = {running: 0, completed: 0, failed: 0};
  const seen = new Set();

  const sorted = Object.values(agents).sort((a, b) => (a.started_at || 0) - (b.started_at || 0));
  for (const a of sorted) {
    seen.add('agent-' + a.id);
    let card = document.getElementById('agent-' + a.id);
    const desiredClass = 'card ' + a.status;
    const desiredHtml = cardHtml(a);
    if (!card) {
      card = document.createElement('div');
      card.id = 'agent-' + a.id;
      card.className = desiredClass;
      card.innerHTML = desiredHtml;
      cols[a.status].appendChild(card);
    } else {
      if (card.className !== desiredClass) card.className = desiredClass;
      if (card.parentElement !== cols[a.status]) cols[a.status].appendChild(card);
      if (card.innerHTML !== desiredHtml) card.innerHTML = desiredHtml;
    }
    counts[a.status]++;
  }

  for (const col of Object.values(cols)) {
    for (const card of Array.from(col.querySelectorAll('.card'))) {
      if (!seen.has(card.id)) card.remove();
    }
  }

  document.getElementById('cnt-running').textContent = counts.running;
  document.getElementById('cnt-completed').textContent = counts.completed;
  document.getElementById('cnt-failed').textContent = counts.failed;
  renderTotals();

  for (const [status, el] of Object.entries(cols)) {
    const empty = el.parentElement.querySelector('.empty-state');
    if (counts[status] === 0 && !empty) {
      const d = document.createElement('div');
      d.className = 'empty-state';
      d.textContent = status === 'running' ? 'No sub-agents running' : (status === 'completed' ? 'Nothing completed' : 'None failed');
      el.parentElement.appendChild(d);
    } else if (counts[status] > 0 && empty) {
      empty.remove();
    }
  }
}

safeRender();
setInterval(() => {
  tickLiveTimers();
}, 1000);

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function md(text) {
  if (!text) return '';
  const codes = [];
  let html = esc(text).replace(/`([^`]+)`/g, (_, c) => {
    codes.push(c);
    return '\u0000' + (codes.length - 1) + '\u0000';
  });
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  html = html.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g, '$1<em>$2</em>');
  html = html.replace(/(^|[^_])_([^_\s][^_]*?)_(?!_)/g, '$1<em>$2</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/\u0000(\d+)\u0000/g, (_, i) => '<code>' + codes[+i] + '</code>');
  return html;
}
</script>
</body>
</html>
