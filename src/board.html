<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strap-in | Plan Board</title>
<style>
:root {
  color-scheme: light dark;
  --bg:#0d1117; --fg:#e6edf3;
  --border:#21262d; --border-soft:#30363d;
  --card-bg:#0d1117; --column-bg:#161b22;
  --muted:#8b949e; --muted-soft:#484f58;
  --accent-planned:#484f58;
  --accent-progress:#58a6ff;
  --accent-progress-glow:rgba(88,166,255,0.08);
  --accent-done:#238636;
  --count-bg:#21262d;
  --code-bg:#1f2937; --code-fg:#e6edf3;
  --link:#58a6ff;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#f6f8fa; --fg:#1f2328;
    --border:#d0d7de; --border-soft:#b1bac4;
    --card-bg:#ffffff; --column-bg:#eef1f4;
    --muted:#57606a; --muted-soft:#8c959f;
    --accent-planned:#8c959f;
    --accent-progress:#0969da;
    --accent-progress-glow:rgba(9,105,218,0.10);
    --accent-done:#1a7f37;
    --count-bg:#d0d7de;
    --code-bg:#eef1f4; --code-fg:#1f2328;
    --link:#0969da;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
}
.header{
  padding:20px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
}
.header h1{
  font-size:18px;font-weight:700;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#ff1078,#b428ff,#0050ff,#00ffc8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--muted-soft);
  flex-shrink:0;
}
.status-dot.connected{background:var(--accent-done);animation:pulse 2s infinite}
.status-dot.disconnected{background:#da3633}
.status-text{font-size:12px;color:var(--muted-soft)}
.header-spacer{flex:1}
.usage{
  font-size:11px;color:var(--muted);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
  letter-spacing:-0.2px;
}
.board{
  display:flex;gap:16px;padding:20px 28px;
  min-height:calc(100vh - 70px);
}
.column{
  flex:1;background:var(--column-bg);border-radius:10px;
  padding:14px;border:1px solid var(--border);
  display:flex;flex-direction:column;
}
.column-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.column-header h2{
  font-size:13px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.5px;
  color:var(--muted);
}
.count{
  background:var(--count-bg);border-radius:10px;
  padding:1px 7px;font-size:11px;color:var(--muted);
}
.cards{flex:1;display:flex;flex-direction:column;gap:8px}
.card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;
  border-left:3px solid var(--accent-planned);
  animation:slideIn 0.3s ease;
}
.card.in-progress{
  border-left-color:var(--accent-progress);
  box-shadow:0 0 12px var(--accent-progress-glow);
}
.card.done{
  border-left-color:var(--accent-done);opacity:0.72;
}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.task-id{font-size:11px;color:var(--muted-soft);font-weight:600;letter-spacing:0.3px}
.cycle-time{
  font-size:10px;color:var(--muted);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
}
.cycle-time.live{color:var(--accent-progress)}
.task-text{font-size:13px;line-height:1.5;color:var(--fg)}
.task-text strong{font-weight:700;color:var(--fg)}
.task-text em{font-style:italic}
.task-text code{
  background:var(--code-bg);color:var(--code-fg);
  padding:1px 5px;border-radius:4px;
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
  font-size:12px;
}
.task-text a{color:var(--link);text-decoration:none}
.task-text a:hover{text-decoration:underline}
.activity{
  font-size:11px;color:var(--accent-progress);margin-top:7px;
  padding-top:7px;border-top:1px solid var(--border);
  font-family:'SF Mono',SFMono-Regular,Consolas,monospace;
  word-break:break-all;
}
.activity code{
  background:var(--code-bg);color:var(--code-fg);
  padding:0 3px;border-radius:3px;
}
.empty-state{
  display:flex;align-items:center;justify-content:center;
  flex:1;color:var(--border-soft);font-size:13px;font-style:italic;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header class="header">
  <h1>strap-in</h1>
  <span class="status-dot" id="status"></span>
  <span class="status-text" id="status-text">connecting</span>
  <span class="header-spacer"></span>
  <span class="usage" id="avg-cycle"></span>
  <span class="usage" id="usage"></span>
</header>
<div class="board">
  <div class="column" id="col-planned">
    <div class="column-header"><h2>Planned</h2><span class="count" id="cnt-planned">0</span></div>
    <div class="cards" id="cards-planned"></div>
  </div>
  <div class="column" id="col-in-progress">
    <div class="column-header"><h2>In Progress</h2><span class="count" id="cnt-in-progress">0</span></div>
    <div class="cards" id="cards-in-progress"></div>
  </div>
  <div class="column" id="col-done">
    <div class="column-header"><h2>Done</h2><span class="count" id="cnt-done">0</span></div>
    <div class="cards" id="cards-done"></div>
  </div>
</div>
<script>
'use strict';
const tasks = {};
let usage = {prompt: 0, completion: 0};
const es = new EventSource('/events');

es.addEventListener('plan_created', e => {
  const data = JSON.parse(e.data);
  for (const k in tasks) delete tasks[k];
  for (const t of data.tasks) {
    tasks[t.id] = {
      text: t.text, status: t.status,
      activity: t.activity || null,
      started_at: t.started_at || null,
      completed_at: t.completed_at || null,
    };
  }
  render();
});

es.addEventListener('task_update', e => {
  const d = JSON.parse(e.data);
  if (tasks[d.id] !== undefined) {
    tasks[d.id].status = d.status;
    tasks[d.id].activity = d.activity || null;
    if (d.started_at != null) tasks[d.id].started_at = d.started_at;
    if (d.completed_at != null) tasks[d.id].completed_at = d.completed_at;
  }
  render();
});

es.addEventListener('board_reset', () => {
  for (const k in tasks) delete tasks[k];
  render();
});

es.addEventListener('usage_update', e => {
  const d = JSON.parse(e.data);
  usage.prompt = d.prompt_tokens;
  usage.completion = d.completion_tokens;
  renderUsage();
});

es.onopen = () => {
  document.getElementById('status').className = 'status-dot connected';
  document.getElementById('status-text').textContent = 'connected';
};
es.onerror = () => {
  document.getElementById('status').className = 'status-dot disconnected';
  document.getElementById('status-text').textContent = 'disconnected';
};

function fmtDuration(ms) {
  if (ms < 1000) return '<1s';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m + 'm ' + (s % 60) + 's';
}

function fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return '' + n;
}

function renderUsage() {
  const el = document.getElementById('usage');
  const total = usage.prompt + usage.completion;
  if (total > 0) {
    el.textContent = fmtTokens(total) + ' tokens (' + fmtTokens(usage.prompt) + ' in \u00b7 ' + fmtTokens(usage.completion) + ' out)';
  }
}

function renderAvgCycle() {
  const el = document.getElementById('avg-cycle');
  const done = Object.values(tasks).filter(t => t.started_at && t.completed_at);
  if (done.length === 0) { el.textContent = ''; return; }
  const sum = done.reduce((a, t) => a + (t.completed_at - t.started_at), 0);
  el.textContent = 'avg ' + fmtDuration(Math.round(sum / done.length)) + ' \u00b7 ' + done.length + ' done';
}

function tickLiveTimers() {
  const now = Date.now();
  for (const [id, t] of Object.entries(tasks)) {
    if (t.status !== 'in_progress' || !t.started_at) continue;
    const el = document.querySelector('#task-' + id + ' .cycle-time.live');
    if (el) el.textContent = fmtDuration(now - t.started_at);
  }
}

function render() {
  const cols = {
    planned: document.getElementById('cards-planned'),
    in_progress: document.getElementById('cards-in-progress'),
    done: document.getElementById('cards-done'),
  };
  const counts = {planned: 0, in_progress: 0, done: 0};

  for (const c of Object.values(cols)) c.innerHTML = '';

  const sorted = Object.entries(tasks).sort((a, b) => +a[0] - +b[0]);
  for (const [id, t] of sorted) {
    const card = document.createElement('div');
    card.className = 'card ' + t.status.replace('_', '-');
    card.id = 'task-' + id;

    let timeHtml = '';
    if (t.started_at && t.completed_at) {
      timeHtml = '<span class="cycle-time">' + fmtDuration(t.completed_at - t.started_at) + '</span>';
    } else if (t.started_at) {
      timeHtml = '<span class="cycle-time live">' + fmtDuration(Date.now() - t.started_at) + '</span>';
    }

    let h = '<div class="card-top"><span class="task-id">Step ' + (+id + 1) + '</span>' + timeHtml + '</div>';
    h += '<div class="task-text">' + md(t.text) + '</div>';
    if (t.activity) h += '<div class="activity">' + md(t.activity) + '</div>';
    card.innerHTML = h;

    cols[t.status].appendChild(card);
    counts[t.status]++;
  }

  document.getElementById('cnt-planned').textContent = counts.planned;
  document.getElementById('cnt-in-progress').textContent = counts.in_progress;
  document.getElementById('cnt-done').textContent = counts.done;
  renderAvgCycle();

  for (const [status, el] of Object.entries(cols)) {
    const empty = el.parentElement.querySelector('.empty-state');
    if (counts[status] === 0 && !empty) {
      const d = document.createElement('div');
      d.className = 'empty-state';
      d.textContent = status === 'in_progress' ? 'Waiting' : (status === 'planned' ? 'No plan yet' : 'Nothing completed');
      el.parentElement.appendChild(d);
    } else if (counts[status] > 0 && empty) {
      empty.remove();
    }
  }
}

render();

// Live-tick in-progress timers every second without re-rendering cards
setInterval(tickLiveTimers, 1000);

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function md(text) {
  if (!text) return '';
  const codes = [];
  let html = esc(text).replace(/`([^`]+)`/g, (_, c) => {
    codes.push(c);
    return '\u0000' + (codes.length - 1) + '\u0000';
  });
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  html = html.replace(/(^|[^*])\*([^*\s][^*]*?)\*(?!\*)/g, '$1<em>$2</em>');
  html = html.replace(/(^|[^_])_([^_\s][^_]*?)_(?!_)/g, '$1<em>$2</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  html = html.replace(/\u0000(\d+)\u0000/g, (_, i) => '<code>' + codes[+i] + '</code>');
  return html;
}
</script>
</body>
</html>
